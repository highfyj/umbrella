scene: ch01
title: 放学后

steps:
  # ── 清晨：一个影响后续分支的小选择 ──
  - bg: 在家_早晨
  - set: { luck: "randint(1, 3)" }   # 开局掷一次"今日运势"，PRNG 状态随存档保存
  - "出门前，天色阴沉得像一块浸了水的抹布。"
  - choice:
      - text: 带上折叠伞
        set: { has_umbrella: true }
      - text: 应该不会下吧
  # 两个选项都没有 goto，选完继续往下执行

  # ── 傍晚：教室 ──
  - bg: { name: 教室_雨天, transition: fade, duration: 800 }
  - bgm: Afternoon_relax
  - "果然还是下了。雨从第五节课开始，一直没有停。"
  - "教室里只剩下我们两个人。"
  - show: { who: 小满, at: center }   # 维度取注册表 default：校服 / 默认表情 / 无状态

  - 小满: "你还不回家吗？"
    id: ch01_0010
  - 我: "雨太大了，再等等。"
  - 小满@赌气: "哼，明明是没带伞吧。"
    id: ch01_0020
  - se: thunder
  - wait: 600
  - 小满@失落: "……其实，我也没带。"
    id: ch01_0030
  - 小满: "（小声嘟囔了一句什么）"
    voice: false

  - if: "has_umbrella"
    then:
      - "书包侧袋里，早上塞进去的折叠伞还在。"
    else:
      - "我看了看空空的书包侧袋，叹了口气。"

  # ── 分支点 ──
  - choice:
      - text: "一起走吧，我送你。"
        if: "has_umbrella"
        set: { favor: "favor + 1" }
        goto: ch02_walk
      - text: 再坐一会儿
        goto: sit_a_while
      - text: 收拾书包，先走一步
        goto: ch02_alone

  # ── 场景内 label 分支：多聊一会儿，再走向 normal 线 ──
  - label: sit_a_while
  - "我们就这样有一搭没一搭地聊着，听雨点敲着窗台。"
  - 小满@微笑: "其实，下雨天也不坏。"
    id: ch01_0040
  - set: { favor: "favor + 1" }
  - jump: ch02_alone
